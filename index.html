<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-size: cover;
            background-position: center;
        }

        header {
            background-color: rgba(0, 123, 255, 0.7);
            color: #fff;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            backdrop-filter: blur(10px);
            z-index: 1;
        }

        header h1 {
            margin: 0;
        }

        .menu-toggle {
            background-color: transparent;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            padding: 10px;
            border-radius: 50%;
            transition: transform 0.3s;
            position: absolute;
            left: 20px;
            z-index: 2;
        }

        .menu-toggle.hide {
            display: none;
        }

        .menu {
            position: fixed;
            top: 0;
            left: -250px;
            width: 250px;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8);
            transition: left 0.3s;
            padding-top: 50px;
            border-top-right-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 1;
        }

        .menu.active {
            left: 0;
        }

        .menu ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .menu li {
            padding: 10px 20px;
            border-bottom: 1px solid #444;
            color: #fff;
        }

        .menu li:last-child {
            border-bottom: none;
        }

        .menu a {
            color: #fff;
            text-decoration: none;
        }

        .close-menu {
            background-color: transparent;
            border: none;
            position: absolute;
            top: 10px;
            right: 10px;
            color: #fff;
            cursor: pointer;
            z-index: 2;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <header>
        <button class="menu-toggle" onclick="toggleMenu()">≡</button>
        <h1>My Website</h1>
    </header>
    <nav class="menu" id="menu">
        <button class="close-menu" onclick="toggleMenu()">≡</button>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="Repository.html">Auto Repo</a></li>
            <li><a href="RevenueCat.html">Revenue Script</a></li>
            <li><a href="JsonToObjC.html">OBJ Converter</a></li>
        </ul>
    </nav>
    <script>
        function toggleMenu() {
            var menu = document.getElementById("menu");
            menu.classList.toggle("active");
            var menuToggle = document.querySelectorAll(".menu-toggle");
            menuToggle.forEach(function(toggle) {
                toggle.classList.toggle("hide");
            });
        }
    </script>
</body>
</html>
