<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавление данных в JSON</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            padding: 20px;
        }

        .container {
            display: flex;
            justify-content: space-between;
            max-width: 1000px;
            margin: 0 auto;
        }

        .form-container {
            width: 48%;
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            overflow: auto;
        }

        .form-container h2 {
            margin-top: 0;
            margin-bottom: 10px;
            text-align: center;
        }

        .form-container > * {
            margin-bottom: 10px;
        } 

        input[type="file"],
        input[type="text"],
        textarea,

        select {
            width: calc(100% - 22px);
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }  

        select {
            appearance: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="currentColor" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 8 4"><path d="M4 4L0 0h8z"/></svg>');
            background-repeat: no-repeat;
            background-position: right 8px center;
            background-size: 8px;
        }

        button {
            width: calc(100% - 22px);
            padding: 10px;
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            display: block;
        }

        button:hover {
            background-color: #0056b3;
        }

        .custom-file-upload {
            display: inline-block;
            position: relative;
            overflow: hidden;
            margin-top: 10px;
        }

        .custom-file-upload input[type="file"] {
            position: absolute;
            top: 0;
            right: 0;
            width: 100%;
            height: 100%;
            font-size: 100px;
            cursor: pointer;
            opacity: 0;
        }

        label {
            display: block;
        }

        #jsonDataDisplay {
            white-space: pre;
            background-color: #f9f9f9;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-top: 10px;
            font-family: monospace;
            overflow-x: auto;
            max-height: 600px;
        }

        .json-key {
            color: red;
        }
    
        .json-string {
            color: green;
        }
    
        .json-boolean {
            color: goldenrod;
        }

        @media screen and (min-width: 801px) {
            .container {
                gap: 20px;
            }
        }

        @media screen and (max-width: 800px) {
            .container {
                flex-direction: column;
                align-items: center;
            }
            .form-container {
                width: 95%;
                margin-bottom: 20px;
            }
            #jsonDataDisplay {
                width: 95%;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body>
    <div class="container">
    <div class="form-container">
        <h2>Форма для добавления данных</h2>
        <button for="jsonFileInput" class="custom-file-upload">
            Загрузить .JSON
            <input type="file" id="jsonFileInput" accept=".json" onchange="loadJSON()">
        </button>
        
        <label for="appName">Название:</label>
        <input type="text" id="appName">
        
        <label for="appVersion">Версия:</label>
        <input type="text" id="appVersion">
        
        <label for="appImage">Ссылка на изображение:</label>
        <input type="text" id="appImage">
        
        <label for="appPackage">Ссылка на приложение:</label>
        <input type="text" id="appPackage">
        
        <label for="appDescription">Описание приложения:</label>
        <textarea id="appDescription" rows="4"></textarea>
        <label for="appCategory">Категория:</label>
        <select id="appCategory">
            <option value="0">Приложение</option>
            <option value="1">Игра</option>
        </select>
        <button onclick="applyChanges()">Применить изменения</button>
        <button onclick="installJSON()">Установить .JSON</button>
    </div>
    <div class="form-container">
        <h2>JSON данные</h2>
        <pre id="jsonDataDisplay" style="display: none;"></pre>
    </div>
</div>
<script>
    var jsonData;
    
    function loadJSON() {
        var input = document.getElementById('jsonFileInput');
        var file = input.files[0];
        var reader = new FileReader();
        reader.onload = function() {
            jsonData = JSON.parse(reader.result);
            displayJSON();
        };
        reader.readAsText(file);
    }
    function displayJSON() {
        if (jsonData) {
            var jsonDataDisplay = document.getElementById('jsonDataDisplay');
            jsonDataDisplay.innerHTML = '';
            var formattedJSON = JSON.stringify(jsonData, null, 2);
            var preElement = document.createElement('pre');
            preElement.classList.add('json-display');
            preElement.innerHTML = syntaxHighlight(formattedJSON);
            jsonDataDisplay.appendChild(preElement);
            jsonDataDisplay.style.display = "block";
        }
    }
    function syntaxHighlight(json) {
        return json.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function(match) {
            var cls = 'json-key';
            if (/^"/.test(match)) {
                if (/:$/.test(match)) {
                    cls = 'json-key';
                } else {
                    cls = 'json-string';
                }
            } else if (/true|false/.test(match)) {
                cls = 'json-boolean';
            } else if (/null/.test(match)) {
                cls = 'json-null';
            }
            return '<span class="' + cls + '">' + match + '</span>';
        });
    }
    function convertJSONtoObjC() {
        if (!jsonData) return;
        var objCString = 'NSDictionary *data = @{';
        for (var key in jsonData) {
            objCString += '"' + key + '": ' + JSON.stringify(jsonData[key]) + ', ';
        }
        objCString = objCString.slice(0, -2); // Remove trailing comma and space
        objCString += '};';
        console.log(objCString);
    }
    function installJSON() {
        convertJSONtoObjC();
    }
</script>
</body>
</html>
